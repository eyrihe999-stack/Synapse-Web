server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all routes fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API requests to backend
    location /api/ {
        proxy_pass http://synapse:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连必需:upstream 走 HTTP/1.1 才支持 chunked transfer encoding;
        # 清空 Connection 头避免把 client 的 keep-alive 串到 upstream(否则 nginx
        # 会按短连接行为关掉空闲连接,SSE 在首次 5s idle 就被切)。
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
